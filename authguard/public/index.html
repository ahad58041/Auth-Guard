<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AuthGuard — Sign In</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body class="bg-[#0a0a14] min-h-screen flex overflow-hidden">

  <!-- ── Left Panel ─────────────────────────────────────── -->
  <div class="hidden lg:flex lg:w-1/2 relative bg-gradient-to-br from-[#0e0b1e] to-[#150d2e] flex-col justify-between p-12 overflow-hidden">
    <div class="blob1"></div>
    <div class="blob2"></div>
    <div class="blob3"></div>

    <!-- Logo -->
    <div class="relative z-10 flex items-center gap-3">
      <div class="w-9 h-9 bg-gradient-to-br from-purple-600 to-violet-700 rounded-xl flex items-center justify-center">
        <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z"/>
        </svg>
      </div>
      <span class="text-white font-bold text-lg">AuthGuard</span>
    </div>

    <!-- Center animation -->
    <div class="relative z-10 flex flex-col items-center">
      <div class="relative mx-auto" style="width:200px;height:200px;">
        <div class="absolute inset-0 border-2 border-dashed border-purple-700/40 rounded-full animate-spin-slow"></div>
        <div class="absolute inset-6 border border-purple-600/30 rounded-full animate-spin-slow-rev"></div>
        <div class="orbit-track orbit-track-1"><div class="orbit-dot orbit-dot-1"></div></div>
        <div class="orbit-track orbit-track-2"><div class="orbit-dot orbit-dot-2"></div></div>
        <div class="orbit-track orbit-track-3"><div class="orbit-dot orbit-dot-3"></div></div>
        <div class="absolute inset-10 border border-purple-500/20 rounded-full animate-glow-pulse"></div>
        <div class="absolute inset-0 flex items-center justify-center animate-float">
          <div class="w-24 h-24 bg-gradient-to-br from-purple-600/30 to-violet-600/20 rounded-full flex items-center justify-center border border-purple-500/30 animate-glow-pulse">
            <div class="w-16 h-16 bg-gradient-to-br from-purple-600 to-violet-700 rounded-full flex items-center justify-center" style="box-shadow:0 10px 40px rgba(109,40,217,0.5)">
              <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"/>
              </svg>
            </div>
          </div>
        </div>
      </div>

      <h2 class="text-white text-2xl font-bold mt-8 text-center">Secure Authentication</h2>
      <p class="text-gray-400 text-sm mt-2 text-center max-w-xs leading-relaxed">Enterprise-grade security with multi-layer protection for your applications.</p>

      <div class="flex gap-4 mt-8">
        <div class="bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-center">
          <div class="text-purple-400 font-bold text-sm">AES-256</div>
          <div class="text-gray-500 text-xs mt-0.5">Encryption</div>
        </div>
        <div class="bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-center">
          <div class="text-purple-400 font-bold text-sm">bcrypt</div>
          <div class="text-gray-500 text-xs mt-0.5">Hashing</div>
        </div>
        <div class="bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-center">
          <div class="text-purple-400 font-bold text-sm">SSL/TLS</div>
          <div class="text-gray-500 text-xs mt-0.5">Transport</div>
        </div>
      </div>
    </div>

    <div class="relative z-10">
      <p class="text-gray-600 text-xs">Trusted authentication infrastructure</p>
    </div>
  </div>

  <!-- ── Right Panel ─────────────────────────────────────── -->
  <div class="flex-1 flex items-center justify-center p-8">
    <div class="w-full max-w-sm">

      <!-- Mobile logo -->
      <div class="flex lg:hidden items-center gap-3 mb-10">
        <div class="w-9 h-9 bg-gradient-to-br from-purple-600 to-violet-700 rounded-xl flex items-center justify-center">
          <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z"/>
          </svg>
        </div>
        <span class="text-white font-bold text-lg">AuthGuard</span>
      </div>

      <!-- Heading -->
      <div class="mb-8">
        <h1 class="text-3xl font-bold text-white mb-1.5">Welcome back</h1>
        <p class="text-gray-500 text-sm">
          Don't have an account?
          <a href="/register" class="text-purple-400 hover:text-purple-300 font-medium transition-colors">Create one</a>
        </p>
      </div>

      <!-- Alert -->
      <div id="alert" class="hidden mb-5 px-4 py-3 rounded-xl text-sm font-medium flex items-start gap-2.5"></div>

      <!-- Form -->
      <form id="loginForm" autocomplete="off" novalidate>
        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-400 mb-2">Email or Username</label>
          <div class="relative">
            <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-600">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/>
              </svg>
            </span>
            <input id="username" type="text" placeholder="Enter email or username"
              class="input-field w-full bg-[#13131f] border border-white/10 text-white placeholder-gray-600 pl-10 pr-4 py-3 rounded-xl text-sm focus:outline-none focus:border-purple-500/70 transition-all duration-200" />
          </div>
        </div>

        <div class="mb-6">
          <label class="block text-sm font-medium text-gray-400 mb-2">Password</label>
          <div class="relative">
            <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-600">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"/>
              </svg>
            </span>
            <input id="password" type="password" placeholder="Enter your password"
              class="input-field w-full bg-[#13131f] border border-white/10 text-white placeholder-gray-600 pl-10 pr-12 py-3 rounded-xl text-sm focus:outline-none focus:border-purple-500/70 transition-all duration-200" />
            <button type="button" id="togglePass" title="Toggle password visibility"
              class="absolute right-3.5 top-1/2 -translate-y-1/2 text-gray-600 hover:text-gray-400 transition-colors">
              <svg id="eyeIcon" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"/>
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" id="submitBtn"
          class="glow-btn w-full bg-gradient-to-r from-purple-600 to-violet-600 hover:from-purple-500 hover:to-violet-500 text-white font-semibold py-3 rounded-xl transition-all duration-200 text-sm flex items-center justify-center gap-2">
          Sign In
        </button>
      </form>

    </div>
  </div>

  <script src="/js/login.js"></script>
</body>
</html>
