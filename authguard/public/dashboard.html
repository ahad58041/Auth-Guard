<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AuthGuard — Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body class="bg-[#0a0a14] min-h-screen flex items-center justify-center p-8">

  <div class="w-full max-w-md text-center">

    <!-- Success icon -->
    <div class="relative inline-flex mb-8">
      <div class="w-24 h-24 bg-gradient-to-br from-purple-600/30 to-violet-600/20 rounded-full flex items-center justify-center border border-purple-500/30 animate-glow-pulse">
        <div class="w-16 h-16 bg-gradient-to-br from-purple-600 to-violet-700 rounded-full flex items-center justify-center" style="box-shadow:0 10px 40px rgba(109,40,217,0.5)">
          <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z"/>
          </svg>
        </div>
      </div>
      <!-- Green check badge -->
      <div class="absolute -bottom-1 -right-1 w-8 h-8 bg-green-500 rounded-full flex items-center justify-center border-2 border-[#0a0a14]">
        <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/>
        </svg>
      </div>
    </div>

    <!-- Text -->
    <h1 id="welcomeMsg" class="text-3xl font-bold text-white mb-2">Welcome!</h1>
    <p class="text-gray-500 mb-8">You're successfully authenticated.</p>

    <!-- Info card -->
    <div class="bg-white/5 border border-white/10 rounded-2xl p-5 mb-8 text-left space-y-3">
      <div class="flex items-center gap-3">
        <div class="w-2 h-2 bg-green-400 rounded-full"></div>
        <span class="text-gray-300 text-sm">Session authenticated</span>
      </div>
      <div class="flex items-center gap-3">
        <div class="w-2 h-2 bg-purple-400 rounded-full"></div>
        <span class="text-gray-300 text-sm">Password verified via bcrypt</span>
      </div>
      <div class="flex items-center gap-3">
        <div class="w-2 h-2 bg-violet-400 rounded-full"></div>
        <span class="text-gray-300 text-sm">Connected to MongoDB Atlas</span>
      </div>
    </div>

    <!-- Sign out -->
    <a href="/" class="inline-flex items-center gap-2 text-sm text-gray-500 hover:text-purple-400 transition-colors">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m3 0l3-3m0 0l-3-3m3 3H9"/>
      </svg>
      Sign out
    </a>
  </div>

  <script src="/js/dashboard.js"></script>
</body>
</html>
